<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Hi Tech GPT – AI Video Call</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0c14;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Full screen call container */
        .call-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #080b14;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Video background - full screen */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.85) saturate(1.1);
        }

        /* Overlay gradient */
        .call-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Top bar - glassmorphism */
        .call-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            background: rgba(10, 14, 30, 0.35);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .call-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .call-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0ecff, #90b4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.3px;
        }

        .call-header h1 i {
            font-size: 1.5rem;
            color: #7a9eff;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 16px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-actions button {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #b0c8ff;
            width: 42px;
            height: 42px;
            border-radius: 40px;
            font-size: 1.1rem;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-actions button:hover {
            background: rgba(255,255,255,0.08);
            transform: scale(0.95);
            color: #d0e4ff;
        }

        /* Chat toggle button - top left */
        .chat-toggle-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #b0c8ff;
            width: 42px;
            height: 42px;
            border-radius: 40px;
            font-size: 1.1rem;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-toggle-btn:hover {
            background: rgba(255,255,255,0.08);
            transform: scale(0.95);
            color: #d0e4ff;
        }

        /* Status - center bottom */
        .status-container {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 28px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 14px;
            color: #f0f4ff;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 12px;
            background: #4caf50;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .status-dot.listening { background: #ffb74d; animation: pulse-dot 1s infinite; }
        .status-dot.thinking { background: #ff9800; animation: pulse-dot 0.8s infinite; }
        .status-dot.speaking { background: #4fc3f7; animation: pulse-dot 0.6s infinite; }
        .status-dot.idle { background: #4caf50; }

        @keyframes pulse-dot {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.3); }
            100% { opacity: 0.4; transform: scale(0.9); }
        }

        /* Subtitle - bottom */
        .subtitle-box {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 14px 28px;
            min-height: 60px;
            max-width: 80%;
            border: 1px solid rgba(255,255,255,0.04);
            color: #e4eeff;
            font-size: 1.05rem;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            text-align: center;
            justify-content: center;
        }

        .subtitle-box i {
            color: #7a9eff;
            font-size: 1rem;
            opacity: 0.6;
        }

        /* Mic button - large, centered */
        .mic-section {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .mic-btn {
            width: 90px;
            height: 90px;
            border-radius: 90px;
            background: linear-gradient(135deg, #2a3d7a, #162050);
            border: 2px solid rgba(255,255,255,0.08);
            color: white;
            font-size: 2.6rem;
            box-shadow: 0 0 0 0 rgba(70, 140, 255, 0.2), 0 12px 40px -8px #000000;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            position: relative;
        }

        .mic-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 0 40px 8px rgba(70, 130, 255, 0.15);
        }

        .mic-btn:active {
            transform: scale(0.92);
        }

        .mic-btn.active {
            background: linear-gradient(135deg, #3f5eb0, #1f307a);
            box-shadow: 0 0 50px 16px rgba(60, 120, 255, 0.25);
            animation: glow-pulse 1.4s infinite;
            border-color: rgba(100, 180, 255, 0.2);
        }

        @keyframes glow-pulse {
            0% { box-shadow: 0 0 0 0 rgba(70, 130, 255, 0.2); }
            70% { box-shadow: 0 0 0 24px rgba(70, 130, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(70, 130, 255, 0); }
        }

        .mic-btn i {
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.15));
        }

        /* ===== CHAT GPT STYLE OVERLAY ===== */
        .chat-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(8, 11, 20, 0.92);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            z-index: 1000;
            display: none;
            flex-direction: column;
            padding: 0;
            animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .chat-overlay.open {
            display: flex;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .chat-overlay-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 28px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }

        .chat-overlay-header h2 {
            color: #e0ecff;
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-overlay-header h2 i {
            color: #7a9eff;
            font-size: 1.2rem;
        }

        .chat-overlay-header .close-chat-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #b0c8ff;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-overlay-header .close-chat-btn:hover {
            background: rgba(255,255,255,0.08);
            transform: scale(0.95);
        }

        .chat-overlay-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-overlay-body::-webkit-scrollbar {
            width: 4px;
        }
        .chat-overlay-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-overlay-body::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
        }

        .chat-msg {
            display: flex;
            gap: 14px;
            max-width: 80%;
            animation: fade-up 0.25s ease;
        }

        .chat-msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .chat-msg .avatar {
            width: 36px;
            height: 36px;
            border-radius: 36px;
            background: rgba(60, 100, 230, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #7a9eff;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .chat-msg.user .avatar {
            background: rgba(255,255,255,0.04);
            color: #b0c8ff;
        }

        .chat-msg .bubble {
            padding: 12px 18px;
            border-radius: 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.02);
            color: #d0deff;
            font-size: 0.95rem;
            line-height: 1.6;
            word-break: break-word;
        }

        .chat-msg.user .bubble {
            background: rgba(60, 100, 230, 0.15);
            border-bottom-right-radius: 4px;
        }

        .chat-msg.ai .bubble {
            border-bottom-left-radius: 4px;
        }

        .chat-msg .bubble .meta {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 6px;
            font-size: 0.7rem;
            opacity: 0.35;
        }

        .chat-msg .bubble .meta button {
            background: transparent;
            border: none;
            color: #90a8e0;
            cursor: pointer;
            font-size: 0.75rem;
            opacity: 0.4;
            transition: 0.2s;
            padding: 0 4px;
        }

        .chat-msg .bubble .meta button:hover {
            opacity: 0.9;
        }

        .chat-overlay-footer {
            padding: 16px 28px;
            border-top: 1px solid rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            background: rgba(0,0,0,0.15);
        }

        .chat-overlay-footer .clear-all-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            color: #7a8fc0;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-overlay-footer .clear-all-btn:hover {
            background: rgba(255,255,255,0.06);
            color: #b0c8ff;
        }

        .chat-overlay-footer .msg-count {
            color: #5a6f90;
            font-size: 0.75rem;
            margin-left: auto;
        }

        /* Chat input area */
        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0 0 0;
            border-top: 1px solid rgba(255,255,255,0.04);
            margin-top: 4px;
            flex-shrink: 0;
        }

        .chat-input-area input {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 30px;
            padding: 12px 18px;
            color: #d0deff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .chat-input-area input::placeholder {
            color: #5a6f90;
        }

        .chat-input-area input:focus {
            border-color: rgba(100, 180, 255, 0.2);
            background: rgba(255,255,255,0.06);
        }

        .chat-input-area .send-btn {
            background: rgba(60, 100, 230, 0.2);
            border: 1px solid rgba(60, 100, 230, 0.15);
            color: #b0c8ff;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-input-area .send-btn:hover {
            background: rgba(60, 100, 230, 0.3);
            transform: scale(0.95);
        }

        .chat-input-area .send-btn:active {
            transform: scale(0.88);
        }

        @keyframes fade-up {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Offline badge */
        .offline-badge {
            background: rgba(200, 60, 60, 0.15);
            border: 1px solid rgba(255, 100, 100, 0.08);
            color: #ffb0b0;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            display: none;
            backdrop-filter: blur(4px);
        }

        /* Typing indicator inside chat */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 8px 16px;
            background: rgba(255,255,255,0.02);
            border-radius: 30px;
            color: #b0c8ff;
            font-size: 0.8rem;
            gap: 4px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .typing-indicator span {
            animation: blink 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60% { opacity: 0.2; }
            30% { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .call-header { padding: 14px 16px; }
            .call-header h1 { font-size: 1.2rem; }
            .call-header h1 i { font-size: 1.2rem; padding: 6px; }
            .header-actions button, .chat-toggle-btn { width: 36px; height: 36px; font-size: 0.9rem; }
            .status-container { bottom: 120px; padding: 6px 18px; font-size: 0.8rem; gap: 10px; }
            .subtitle-box { bottom: 68px; padding: 10px 18px; font-size: 0.9rem; max-width: 90%; min-height: 48px; }
            .mic-btn { width: 74px; height: 74px; font-size: 2.2rem; }
            .chat-overlay-body { padding: 16px; }
            .chat-msg { max-width: 92%; }
            .chat-overlay-header { padding: 14px 16px; }
            .chat-overlay-footer { padding: 12px 16px; flex-wrap: wrap; }
            .chat-input-area input { font-size: 0.8rem; padding: 10px 14px; }
        }
    </style>
</head>
<body>
<div class="call-container" id="app">
    <!-- Video background -->
    <div class="video-bg">
        <video id="aiVideo" autoplay muted playsinline loop>
            <source src="thinkinggirl1.mp4" type="video/mp4">
        </video>
    </div>
    <div class="call-overlay"></div>

    <!-- Header -->
    <div class="call-header">
        <div class="call-header-left">
            <button class="chat-toggle-btn" id="chatToggleBtn" title="Open chat">
                <i class="fas fa-comment-dots"></i>
            </button>
            <h1><i class="fas fa-microchip"></i> Hi Tech GPT</h1>
        </div>
        <div class="header-actions">
            <button id="fullscreenBtn" title="Fullscreen"><i class="fas fa-expand"></i></button>
            <span class="offline-badge" id="offlineBadge"><i class="fas fa-wifi-slash"></i></span>
        </div>
    </div>

    <!-- Status -->
    <div class="status-container" id="statusContainer">
        <span class="status-dot idle" id="statusDot"></span>
        <span id="statusText">Ready</span>
    </div>

    <!-- Subtitles -->
    <div class="subtitle-box" id="subtitleBox">
        <i class="fas fa-caption"></i>
        <span id="subtitleText">Tap the mic to start</span>
    </div>

    <!-- Mic -->
    <div class="mic-section">
        <button class="mic-btn" id="micBtn" aria-label="Start listening">
            <i class="fas fa-microphone"></i>
        </button>
    </div>

    <!-- ===== CHAT GPT STYLE OVERLAY ===== -->
    <div class="chat-overlay" id="chatOverlay">
        <div class="chat-overlay-header">
            <h2><i class="fas fa-comment-dots"></i> Conversation</h2>
            <button class="close-chat-btn" id="closeChatBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="chat-overlay-body" id="chatOverlayBody">
            <!-- Messages rendered here -->
            <div class="typing-indicator" id="typingIndicator">
                <span>●</span><span>●</span><span>●</span> Thinking
            </div>
        </div>
        <div class="chat-overlay-footer">
            <button class="clear-all-btn" id="clearAllChatBtn"><i class="fas fa-eraser"></i> Clear all</button>
            <span class="msg-count" id="msgCount">0 messages</span>
        </div>
        <!-- Chat Input Area -->
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type your question..." />
            <button class="send-btn" id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // DOM refs
        const video = document.getElementById('aiVideo');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const subtitleText = document.getElementById('subtitleText');
        const micBtn = document.getElementById('micBtn');
        const offlineBadge = document.getElementById('offlineBadge');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const chatToggleBtn = document.getElementById('chatToggleBtn');
        const chatOverlay = document.getElementById('chatOverlay');
        const closeChatBtn = document.getElementById('closeChatBtn');
        const chatOverlayBody = document.getElementById('chatOverlayBody');
        const clearAllChatBtn = document.getElementById('clearAllChatBtn');
        const msgCount = document.getElementById('msgCount');
        const chatInput = document.getElementById('chatInput');
        const sendChatBtn = document.getElementById('sendChatBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // State
        let isListening = false;
        let isSpeaking = false;
        let currentUtterance = null;
        let recognition = null;
        let chatHistory = [];
        let dataAnswers = [];
        let speechVoices = [];
        let speechSynth = null;
        let isProcessing = false;

        // Check if speech synthesis is available
        function getSpeechSynthesis() {
            if (window.speechSynthesis) {
                return window.speechSynthesis;
            }
            return null;
        }

        // Video control
        function setVideo(src) {
            if (video.src !== src) {
                video.src = src;
                video.load();
                video.play().catch(() => {});
            }
        }

        function setStatus(type, text) {
            statusDot.className = 'status-dot';
            if (type === 'listening') statusDot.classList.add('listening');
            else if (type === 'thinking') statusDot.classList.add('thinking');
            else if (type === 'speaking') statusDot.classList.add('speaking');
            else statusDot.classList.add('idle');
            statusText.textContent = text;
        }

        function showSubtitle(msg) {
            subtitleText.textContent = msg || ' ';
        }

        // ===== CHAT RENDER =====
        function renderOverlayChat() {
            // Remove existing messages but keep typing indicator
            const children = chatOverlayBody.children;
            for (let i = children.length - 1; i >= 0; i--) {
                if (children[i].id !== 'typingIndicator') {
                    children[i].remove();
                }
            }

            if (chatHistory.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'color: #5a6f90; text-align: center; padding: 40px 20px; font-size: 0.95rem;';
                empty.innerHTML = '<i class="fas fa-comment" style="font-size: 2rem; display: block; margin-bottom: 12px; opacity: 0.3;"></i>No messages yet';
                chatOverlayBody.insertBefore(empty, typingIndicator);
                msgCount.textContent = '0 messages';
                return;
            }

            chatHistory.forEach(entry => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `chat-msg ${entry.role}`;
                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.innerHTML = entry.role === 'ai' ? '<i class="fas fa-robot"></i>' : '<i class="fas fa-user"></i>';

                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const time = new Date(entry.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                bubble.innerHTML = `
                    <div>${entry.text}</div>
                    <div class="meta">
                        <span>${time}</span>
                        <span>
                            <button class="copy-btn-overlay" data-text="${encodeURIComponent(entry.text)}"><i class="fas fa-copy"></i></button>
                            ${entry.role === 'ai' ? `<button class="speak-again-overlay" data-text="${encodeURIComponent(entry.text)}"><i class="fas fa-volume-up"></i></button>` : ''}
                        </span>
                    </div>
                `;
                msgDiv.appendChild(avatar);
                msgDiv.appendChild(bubble);
                chatOverlayBody.insertBefore(msgDiv, typingIndicator);
            });

            msgCount.textContent = `${chatHistory.length} messages`;
            chatOverlayBody.scrollTop = chatOverlayBody.scrollHeight;

            // Attach events
            document.querySelectorAll('.copy-btn-overlay').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const raw = btn.dataset.text;
                    const text = decodeURIComponent(raw);
                    if (navigator.clipboard) {
                        navigator.clipboard.writeText(text).catch(() => {});
                    }
                    btn.innerHTML = '<i class="fas fa-check" style="color:#6d8cff;"></i>';
                    setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i>', 1200);
                });
            });
            document.querySelectorAll('.speak-again-overlay').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const raw = btn.dataset.text;
                    const text = decodeURIComponent(raw);
                    speakText(text);
                });
            });
        }

        function addChat(role, text) {
            chatHistory.push({ role, text, timestamp: Date.now() });
            renderOverlayChat();
        }

        // Speech
        function getFemaleVoice() {
            if (!speechSynth) return null;
            if (speechVoices.length === 0) {
                try {
                    speechVoices = speechSynth.getVoices() || [];
                } catch(e) {
                    speechVoices = [];
                }
            }
            const female = speechVoices.find(v =>
                v && (/female/i.test(v.name) ||
                /zira/i.test(v.name) ||
                /samantha/i.test(v.name) ||
                /google uk female/i.test(v.name) ||
                /ms. /i.test(v.name))
            );
            return female || speechVoices.find(v => v && /en/i.test(v.lang)) || speechVoices[0] || null;
        }

        function speakText(text, callback) {
            if (!speechSynth) {
                if (callback) callback();
                return;
            }

            if (isSpeaking) {
                try {
                    speechSynth.cancel();
                } catch(e) {}
                isSpeaking = false;
            }
            if (!text || text.trim().length === 0) {
                if (callback) callback();
                return;
            }

            if (speechVoices.length === 0) {
                try {
                    speechVoices = speechSynth.getVoices() || [];
                } catch(e) {
                    speechVoices = [];
                }
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            utterance.volume = 1;

            const voice = getFemaleVoice();
            if (voice) utterance.voice = voice;

            currentUtterance = utterance;
            isSpeaking = true;
            setStatus('speaking', 'Speaking...');
            setVideo('speakgirl1.mp4');

            utterance.onstart = () => {
                showSubtitle(text);
            };

            utterance.onend = () => {
                isSpeaking = false;
                currentUtterance = null;
                setStatus('idle', 'Ready');
                setVideo('thinkinggirl1.mp4');
                if (callback) callback();
            };

            utterance.onerror = (e) => {
                console.warn('Speech error:', e);
                isSpeaking = false;
                currentUtterance = null;
                setStatus('idle', 'Ready');
                setVideo('thinkinggirl1.mp4');
                if (callback) callback();
            };

            try {
                speechSynth.speak(utterance);
            } catch(e) {
                console.warn('Speech synthesis error:', e);
                isSpeaking = false;
                currentUtterance = null;
                setStatus('idle', 'Ready');
                setVideo('thinkinggirl1.mp4');
                if (callback) callback();
            }
        }

        function stopSpeaking() {
            if (speechSynth && speechSynth.speaking) {
                try {
                    speechSynth.cancel();
                } catch(e) {}
            }
            isSpeaking = false;
            currentUtterance = null;
            setStatus('idle', 'Ready');
            setVideo('thinkinggirl1.mp4');
        }

        // AI logic
        function findAnswer(query) {
            if (!dataAnswers || dataAnswers.length === 0) return null;
            const q = query.toLowerCase().trim();
            let best = null;
            let bestScore = 0;
            for (const item of dataAnswers) {
                const keywords = item.keywords || [];
                let score = 0;
                for (const kw of keywords) {
                    const k = kw.toLowerCase();
                    if (q.includes(k)) score += 2;
                    else if (k.split(' ').some(word => q.includes(word))) score += 1;
                }
                if (score > bestScore) {
                    bestScore = score;
                    best = item.answer;
                }
            }
            if (bestScore >= 1) return best;
            return null;
        }

        async function fetchPollinations(query) {
            try {
                const url = `https://pollinations.ai/api/v1/generate?prompt=${encodeURIComponent(query)}&model=openai&response=text`;
                const resp = await fetch(url, { method: 'GET' });
                if (!resp.ok) throw new Error('Pollinations error');
                const text = await resp.text();
                return text.trim() || "Sorry, I couldn't generate a response.";
            } catch (e) {
                console.warn('Pollinations fetch error:', e);
                return "I'm having trouble connecting to my brain. Please try again later.";
            }
        }

        async function processQuery(userText) {
            if (!userText || userText.trim().length === 0 || isProcessing) return;
            isProcessing = true;

            // Show typing indicator
            typingIndicator.style.display = 'flex';
            chatOverlayBody.scrollTop = chatOverlayBody.scrollHeight;

            showSubtitle(userText);
            addChat('user', userText);
            setStatus('thinking', 'Thinking...');
            setVideo('thinkinggirl1.mp4');

            let answer = findAnswer(userText);

            if (!answer) {
                try {
                    const poll = await fetchPollinations(userText);
                    answer = poll;
                } catch (e) {
                    answer = "I couldn't process that right now. Please try again.";
                }
            }

            // Hide typing indicator
            typingIndicator.style.display = 'none';

            addChat('ai', answer);
            speakText(answer, () => {
                setStatus('idle', 'Ready');
                setVideo('thinkinggirl1.mp4');
                isProcessing = false;
            });
        }

        // Speech Recognition
        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Your browser does not support Speech Recognition. Please use Chrome or Edge.');
                return;
            }
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'hi-IN';
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('active');
                setStatus('listening', 'Listening...');
                showSubtitle('🎤 Listening...');
            };

            recognition.onerror = (event) => {
                console.warn('Speech error:', event.error);
                if (event.error === 'not-allowed') {
                    alert('Microphone access denied. Please allow microphone in your browser.');
                }
                stopListening();
            };

            recognition.onend = () => {
                stopListening();
            };

            recognition.onresult = (event) => {
                const last = event.results.length - 1;
                const transcript = event.results[last][0].transcript.trim();
                if (transcript.length > 0) {
                    stopListening();
                    processQuery(transcript);
                } else {
                    stopListening();
                    showSubtitle('No speech detected');
                }
            };
        }

        function stopListening() {
            if (recognition) {
                try { recognition.stop(); } catch (e) {}
            }
            isListening = false;
            micBtn.classList.remove('active');
            if (!isSpeaking) {
                setStatus('idle', 'Ready');
                setVideo('thinkinggirl1.mp4');
            }
        }

        function toggleListening() {
            if (isListening) {
                stopListening();
                return;
            }
            if (!recognition) initSpeech();
            if (!recognition) return;
            try {
                recognition.start();
            } catch (e) {
                stopListening();
                setTimeout(() => {
                    try { recognition.start(); } catch (ex) {}
                }, 200);
            }
        }

        // Load data
        async function loadData() {
            try {
                const resp = await fetch('data.json');
                if (!resp.ok) throw new Error('data.json not found');
                dataAnswers = await resp.json();
                if (!Array.isArray(dataAnswers)) dataAnswers = [];
            } catch (e) {
                console.warn('data.json load failed', e);
                dataAnswers = [];
            }
        }

        // Online status
        function updateOnlineStatus() {
            const online = navigator.onLine;
            offlineBadge.style.display = online ? 'none' : 'inline-flex';
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.body.requestFullscreen?.() || document.body.webkitRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || document.webkitExitFullscreen?.();
            }
        }

        // Load voices with error handling
        function loadVoices() {
            return new Promise((resolve) => {
                speechSynth = getSpeechSynthesis();
                if (!speechSynth) {
                    console.warn('Speech synthesis not available');
                    resolve();
                    return;
                }

                try {
                    const voices = speechSynth.getVoices();
                    if (voices && voices.length > 0) {
                        speechVoices = voices;
                        resolve();
                    } else {
                        speechSynth.onvoiceschanged = () => {
                            try {
                                speechVoices = speechSynth.getVoices() || [];
                            } catch(e) {
                                speechVoices = [];
                            }
                            resolve();
                        };
                        setTimeout(() => {
                            try {
                                speechVoices = speechSynth.getVoices() || [];
                            } catch(e) {
                                speechVoices = [];
                            }
                            resolve();
                        }, 1000);
                    }
                } catch(e) {
                    console.warn('Error loading voices:', e);
                    speechVoices = [];
                    resolve();
                }
            });
        }

        // Chat overlay controls
        function openChatOverlay() {
            chatOverlay.classList.add('open');
            renderOverlayChat();
            // Focus on input after a small delay
            setTimeout(() => chatInput.focus(), 300);
        }

        function closeChatOverlay() {
            chatOverlay.classList.remove('open');
        }

        function toggleChatOverlay() {
            if (chatOverlay.classList.contains('open')) {
                closeChatOverlay();
            } else {
                openChatOverlay();
            }
        }

        // Handle send message
        function handleSendMessage() {
            const text = chatInput.value.trim();
            if (text && !isProcessing) {
                chatInput.value = '';
                processQuery(text);
            }
        }

        // Init
        async function init() {
            await loadData();
            await loadVoices();

            setVideo('thinkinggirl1.mp4');
            setStatus('idle', 'Ready');
            showSubtitle('Tap the mic to start');

            micBtn.addEventListener('click', toggleListening);
            fullscreenBtn.addEventListener('click', toggleFullscreen);

            chatToggleBtn.addEventListener('click', toggleChatOverlay);
            closeChatBtn.addEventListener('click', closeChatOverlay);

            clearAllChatBtn.addEventListener('click', () => {
                chatHistory = [];
                renderOverlayChat();
                showSubtitle('Chat cleared');
                setTimeout(() => showSubtitle('Tap the mic to start'), 1200);
            });

            // Chat input events
            sendChatBtn.addEventListener('click', handleSendMessage);
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSendMessage();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && isSpeaking) stopSpeaking();
                if (e.key === 'Escape' && chatOverlay.classList.contains('open')) closeChatOverlay();
            });

            initSpeech();
            updateOnlineStatus();
            addChat('ai', '👋 Namaste! Main Hi Tech GPT hoon. Kuch poochhiye?');
        }

        window.addEventListener('beforeunload', () => {
            if (speechSynth) {
                try { speechSynth.cancel(); } catch(e) {}
            }
        });

        // Start the app
        init();

    })();
</script>
